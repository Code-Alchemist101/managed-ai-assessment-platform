version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: assessment
      POSTGRES_USER: assessment
      POSTGRES_PASSWORD: assessment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10
    restart: unless-stopped
    command:
      - "--jetstream"
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: assessment
      MINIO_ROOT_PASSWORD: assessment123
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  clickhouse-data:
  minio-data:
